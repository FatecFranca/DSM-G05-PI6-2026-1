version: "3.9"

services:
  db:
    image: postgres:17-alpine
    container_name: commodities_db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/seed_all.sql:/docker-entrypoint-initdb.d/02_seed_all.sql
      - ./database/seed_materias_primas.sql:/docker-entrypoint-initdb.d/seeds/seed_materias_primas.sql
      - ./database/seed_usuarios.sql:/docker-entrypoint-initdb.d/seeds/seed_usuarios.sql
      - ./database/seed_historico_precos.sql:/docker-entrypoint-initdb.d/seeds/seed_historico_precos.sql
      - ./database/seed_compras.sql:/docker-entrypoint-initdb.d/seeds/seed_compras.sql
      - ./database/seed_alertas.sql:/docker-entrypoint-initdb.d/seeds/seed_alertas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: commodities_api
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MODEL_PATH=/app/artifacts
      - REDIS_HOST=redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: commodities_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
